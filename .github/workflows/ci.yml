name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - full-refactor

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate modules
        run: pnpm generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test with Coverage
        run: pnpm test:coverage

      - name: Coverage Summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## 📊 Test Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Statements | Branches | Functions | Lines |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-----------|----------|-----------|-------|" >> $GITHUB_STEP_SUMMARY

            node -e "
              const data = require('./coverage/coverage-summary.json');
              for (const [file, metrics] of Object.entries(data)) {
                const name = file === 'total' ? '**Total**' : file.replace(process.cwd() + '/', '');
                const stmt = metrics.statements.pct + '%';
                const branch = metrics.branches.pct + '%';
                const func = metrics.functions.pct + '%';
                const lines = metrics.lines.pct + '%';
                console.log('| ' + name + ' | ' + stmt + ' | ' + branch + ' | ' + func + ' | ' + lines + ' |');
              }
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build
        run: pnpm build

      - name: Check build output
        run: |
          if [ ! -f "dist/index.js" ] || [ ! -f "dist/index.cjs" ] || [ ! -f "dist/index.d.ts" ]; then
            echo "Build output is incomplete"
            exit 1
          fi
          echo "Build output verified successfully"
